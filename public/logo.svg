<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Definición del gradiente con los colores de tu app -->
  <defs>
    <linearGradient id="momentumGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 
    El Ciclo Ascendente:
    - M20,80: Mueve el punto de inicio a la parte inferior izquierda.
    - A40,40 0 1,1 85,45: Dibuja un arco elíptico (A) con radios de 40x40, sin rotación, indicando que es un arco largo (1) y que va en sentido horario (1), hasta el punto final (85,45).
    - L95,35: Dibuja una línea (L) para formar la punta superior de la flecha.
    - M85,45: Mueve el lápiz de nuevo al final del arco.
    - L80,58: Dibuja la punta inferior de la flecha.
  -->
  <path 
    d="M 20 80 A 40 40 0 1 1 85 45 L 95 35 M 85 45 L 80 58" 
    stroke="url(#momentumGradient)" 
    stroke-width="8" 
    fill="none" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>
